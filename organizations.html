<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台灣搖擺舞組織介紹</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #F7F3EE; --dark: #1A1410; --brown: #8B5E3C;
  --gold: #C4973A; --muted: #6B5D52; --border: rgba(139,94,60,0.15);
  --taipei: #2D6A9F; --hsinchu: #3A7D44; --taichung: #C4973A;
  --tainan: #B85C3A; --kaohsiung: #7B3F9E;
}
body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); color: var(--dark); min-height: 100vh; }

/* NAV */
nav { background: var(--dark); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
.nav-logo { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.15rem; text-decoration: none; display: block; }
.nav-sub { font-size: 0.68rem; color: rgba(255,255,255,0.3); letter-spacing: 0.1em; }
.nav-links { display: flex; gap: 1.5rem; list-style: none; }
.nav-links a { color: rgba(255,255,255,0.55); text-decoration: none; font-size: 0.82rem; letter-spacing: 0.04em; transition: color 0.2s; }
.nav-links a:hover, .nav-links a.active { color: var(--gold); }

/* HERO */
.hero { background: var(--dark); padding: 3.5rem 2rem 3rem; text-align: center; position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 50%, rgba(196,151,58,0.07) 0%, transparent 55%); }
.hero-tag { display: inline-block; background: rgba(196,151,58,0.12); color: var(--gold); font-size: 0.68rem; letter-spacing: 0.18em; padding: 0.28rem 0.9rem; border-radius: 100px; margin-bottom: 1.25rem; border: 0.5px solid rgba(196,151,58,0.25); position: relative; }
.hero h1 { font-family: 'Playfair Display', serif; color: #fff; font-size: clamp(1.6rem, 4vw, 2.8rem); margin-bottom: 0.6rem; position: relative; }
.hero h1 em { color: var(--gold); font-style: italic; }
.hero p { color: rgba(255,255,255,0.4); font-size: 0.85rem; font-weight: 300; letter-spacing: 0.06em; position: relative; }

/* FILTERS */
.filters-bar { background: white; border-bottom: 0.5px solid var(--border); padding: 0 2rem; position: sticky; top: 60px; z-index: 90; }
.filters-inner { max-width: 1100px; margin: 0 auto; display: flex; gap: 0.5rem; align-items: center; padding: 0.65rem 0; overflow-x: auto; scrollbar-width: none; }
.filters-inner::-webkit-scrollbar { display: none; }
.filter-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; white-space: nowrap; margin-right: 0.25rem; }
.filter-btn { background: none; border: 0.5px solid var(--border); border-radius: 100px; padding: 0.28rem 0.85rem; font-size: 0.75rem; font-family: 'Noto Sans TC', sans-serif; color: var(--muted); cursor: pointer; transition: all 0.18s; white-space: nowrap; display: flex; align-items: center; gap: 0.3rem; }
.filter-btn:hover { border-color: var(--brown); color: var(--brown); }
.filter-btn.active { background: var(--dark); border-color: var(--dark); color: white; }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* LOADING */
.loading-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
.spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
@keyframes spin { to { transform: rotate(360deg); } }

/* MAIN */
main { max-width: 1100px; margin: 0 auto; padding: 2rem 2rem 5rem; }

/* AREA GROUP */
.area-group { margin-bottom: 3rem; }
.area-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.25rem; }
.area-title { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--dark); display: flex; align-items: center; gap: 0.6rem; }
.area-dot-lg { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.area-line { flex: 1; height: 0.5px; background: var(--border); }
.area-count { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.06em; }

/* ORG CARDS GRID */
.orgs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }

/* ORG CARD */
.org-card { background: white; border: 0.5px solid var(--border); border-radius: 14px; overflow: hidden; transition: all 0.18s; cursor: pointer; }
.org-card:hover { border-color: rgba(139,94,60,0.25); transform: translateY(-3px); box-shadow: 0 8px 28px rgba(26,20,16,0.08); }
.org-card-header { padding: 1.1rem 1.25rem 0.8rem; position: relative; }
.org-card-header::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3.5px; border-radius: 3.5px 0 0 0; }
.org-card.taipei .org-card-header::before { background: var(--taipei); }
.org-card.hsinchu .org-card-header::before { background: var(--hsinchu); }
.org-card.taichung .org-card-header::before { background: var(--taichung); }
.org-card.tainan .org-card-header::before { background: var(--tainan); }
.org-card.kaohsiung .org-card-header::before { background: var(--kaohsiung); }
.org-area-badge { display: inline-flex; align-items: center; gap: 0.28rem; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.07em; margin-bottom: 0.4rem; }
.org-name { font-size: 1rem; font-weight: 500; color: var(--dark); margin-bottom: 0.3rem; }
.org-intro { font-size: 0.78rem; color: var(--muted); line-height: 1.6; }
.org-links { display: flex; gap: 0.5rem; padding: 0.7rem 1.25rem; border-top: 0.5px solid var(--border); background: rgba(247,243,238,0.5); }
.org-link { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; color: var(--muted); text-decoration: none; padding: 0.22rem 0.6rem; border-radius: 100px; border: 0.5px solid var(--border); transition: all 0.15s; }
.org-link:hover { background: var(--dark); color: white; border-color: var(--dark); }
.org-link.ig:hover { background: #E1306C; border-color: #E1306C; color: white; }
.org-link.fb:hover { background: #1877F2; border-color: #1877F2; color: white; }

/* EVENTS SECTION (expanded) */
.org-events { padding: 0 1.25rem 1rem; border-top: 0.5px solid var(--border); display: none; }
.org-events.open { display: block; }
.org-events-title { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; padding: 0.75rem 0 0.6rem; }
.org-event-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0; border-bottom: 0.5px solid var(--border); }
.org-event-item:last-child { border-bottom: none; }
.org-event-date { font-family: 'Playfair Display', serif; font-size: 1.1rem; color: var(--gold); min-width: 36px; text-align: center; line-height: 1; }
.org-event-date-sub { font-size: 0.6rem; color: var(--muted); text-align: center; }
.org-event-info { flex: 1; }
.org-event-name { font-size: 0.82rem; font-weight: 500; }
.org-event-meta { font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; }
.tbd-badge { font-size: 0.6rem; background: #FFF3E0; color: #E65100; padding: 0.1rem 0.4rem; border-radius: 100px; margin-left: 0.3rem; }
.no-events-msg { font-size: 0.78rem; color: var(--muted); padding: 0.75rem 0; text-align: center; }

.toggle-btn { width: 100%; background: none; border: none; border-top: 0.5px solid var(--border); padding: 0.55rem; font-size: 0.72rem; color: var(--muted); cursor: pointer; font-family: 'Noto Sans TC', sans-serif; letter-spacing: 0.05em; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 0.4rem; }
.toggle-btn:hover { background: rgba(247,243,238,0.8); color: var(--dark); }
.toggle-icon { transition: transform 0.2s; font-style: normal; }
.toggle-btn.open .toggle-icon { transform: rotate(180deg); }

.no-orgs { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.85rem; }

/* FOOTER */
footer { background: var(--dark); color: rgba(255,255,255,0.32); text-align: center; padding: 2rem; font-size: 0.73rem; letter-spacing: 0.05em; line-height: 1.8; }
footer a { color: var(--gold); text-decoration: none; }

@media (max-width: 600px) {
  nav { padding: 0 1rem; }
  main { padding: 1.25rem 1rem 4rem; }
  .filters-bar { padding: 0 1rem; }
  .orgs-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html">
    <div class="nav-logo">Taiwan Swing 🎷</div>
    <div class="nav-sub">台灣搖擺舞活動行事曆</div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html">活動總覽</a></li>
    <li><a href="organizations.html" class="active">組織介紹</a></li>
  </ul>
</nav>

<div class="hero">
  <div class="hero-tag">TAIWAN SWING ORGANIZATIONS</div>
  <h1>台灣<em>搖擺舞</em>組織</h1>
  <p>認識全台各地的搖擺舞社群與組織</p>
</div>

<div class="filters-bar">
  <div class="filters-inner">
    <span class="filter-label">地區</span>
    <button class="filter-btn active" onclick="filterOrgs('all', this)">全部</button>
    <button class="filter-btn" onclick="filterOrgs('台北', this)"><span class="dot" style="background:var(--taipei)"></span>台北</button>
    <button class="filter-btn" onclick="filterOrgs('新竹', this)"><span class="dot" style="background:var(--hsinchu)"></span>新竹</button>
    <button class="filter-btn" onclick="filterOrgs('台中', this)"><span class="dot" style="background:var(--taichung)"></span>台中</button>
    <button class="filter-btn" onclick="filterOrgs('台南', this)"><span class="dot" style="background:var(--tainan)"></span>台南</button>
    <button class="filter-btn" onclick="filterOrgs('高雄', this)"><span class="dot" style="background:var(--kaohsiung)"></span>高雄</button>
  </div>
</div>

<main id="main">
  <div class="loading-state"><div class="spinner"></div><p>載入組織資料中⋯</p></div>
</main>

<footer>
  資料來源：台灣搖擺舞行事曆 ｜ 由 <a href="https://www.instagram.com/flyatwinds" target="_blank">@flyatwinds</a> 維護<br>
  如有資訊出入，以各組織公告為基準 ｜ 歡迎私訊補充 💌
</footer>

<script>
const ORG_API     = 'https://script.google.com/macros/s/AKfycbw1kg3ngbY0VPLvrJyFhv66aFkt1UUltTod5z4yKf_MG2i8tFvygH6-0qzUDVA2AHBr/exec';
const WORKER_URL  = 'https://swing-calendar-proxy.flyatwinds.workers.dev/';
const MONTHS_EN   = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const WEEKDAYS    = ['日','一','二','三','四','五','六'];
const AREA_CLASS  = { '台北':'taipei','新竹':'hsinchu','台中':'taichung','台南':'tainan','高雄':'kaohsiung' };
const AREA_COLOR  = { '台北':'var(--taipei)','新竹':'var(--hsinchu)','台中':'var(--taichung)','台南':'var(--tainan)','高雄':'var(--kaohsiung)' };
const AREA_ORDER  = ['台北','新竹','台中','台南','高雄'];

let allOrgs   = [];
let allEvents = [];
let currentArea = 'all';

// ── 解析 iCal ──
function parseICal(text) {
  const events = [];
  const blocks = text.split('BEGIN:VEVENT');
  blocks.shift();
  blocks.forEach(block => {
    const get = key => { const m = block.match(new RegExp(`${key}(?:;[^:]*)?:([^\r\n]+)`)); return m ? m[1].trim() : ''; };
    const summary  = get('SUMMARY').replace(/\\,/g,',').replace(/\\n/g,' ');
    const location = get('LOCATION').replace(/\\,/g,',');
    const desc     = get('DESCRIPTION').replace(/\\n/g,'\n').replace(/\\,/g,',');
    const dtstart  = get('DTSTART');
    const dtend    = get('DTEND');
    if (!summary || !dtstart) return;
    const parseDate = s => {
      if (!s) return null;
      s = s.replace(/[TZ]/g,'').replace(/\s/g,'');
      if (s.length === 8) return new Date(+s.slice(0,4), +s.slice(4,6)-1, +s.slice(6,8));
      return new Date(+s.slice(0,4), +s.slice(4,6)-1, +s.slice(6,8), +s.slice(8,10)||0, +s.slice(10,12)||0);
    };
    const start = parseDate(dtstart);
    if (!start) return;
    const getField = label => { const m = desc.match(new RegExp(`${label}[：:]([^\n]+)`)); return m ? m[1].trim() : ''; };
    const isAllDay   = dtstart.length === 8;
    const isFestival = summary.startsWith('📆');
    const isPending  = summary.includes('時間待確認');
    events.push({
      summary: summary.replace(/^[⏳📆\s]+/,'').replace('（時間待確認）','').replace(/^\[.*?\]\s*/,''),
      location, org: getField('組織'), area: getField('地區'),
      start, isAllDay, isFestival, isPending
    });
  });
  return events.sort((a,b) => a.start - b.start);
}

// ── 取得某組織的未來活動 ──
function getOrgEvents(orgName) {
  const today = new Date(); today.setHours(0,0,0,0);
  return allEvents.filter(e =>
    !e.isAllDay && !e.isFestival &&
    e.org === orgName &&
    e.start >= today
  ).slice(0, 5);
}

// ── 渲染活動列表 ──
function renderOrgEvents(orgName) {
  const events = getOrgEvents(orgName);
  if (!events.length) return `<div class="no-events-msg">近期暫無活動 🎷</div>`;
  return events.map(e => {
    const d = e.start;
    const timeStr = e.isAllDay ? '全天' : `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `
      <div class="org-event-item">
        <div>
          <div class="org-event-date">${d.getDate()}</div>
          <div class="org-event-date-sub">${MONTHS_EN[d.getMonth()]}</div>
        </div>
        <div class="org-event-info">
          <div class="org-event-name">
            ${e.summary}
            ${e.isPending ? '<span class="tbd-badge">待確認</span>' : ''}
          </div>
          <div class="org-event-meta">
            週${WEEKDAYS[d.getDay()]} ${timeStr}
            ${e.location ? ` ・ ${e.location}` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

// ── toggle 展開活動 ──
function toggleEvents(orgName, btn) {
  const eventsEl = btn.previousElementSibling;
  const isOpen = eventsEl.classList.contains('open');
  if (isOpen) {
    eventsEl.classList.remove('open');
    btn.classList.remove('open');
    btn.innerHTML = `<span class="toggle-icon">▾</span> 查看近期活動`;
  } else {
    eventsEl.innerHTML = `<div class="org-events-title">近期活動</div>` + renderOrgEvents(orgName);
    eventsEl.classList.add('open');
    btn.classList.add('open');
    btn.innerHTML = `<span class="toggle-icon">▾</span> 收起活動`;
  }
}

// ── 渲染一張組織卡 ──
function renderOrgCard(org) {
  const cls = AREA_CLASS[org.area] || '';
  const dotColor = AREA_COLOR[org.area] || '#999';
  const igHandle = org.ig ? org.ig.replace('@','') : '';
  const igUrl = igHandle ? `https://www.instagram.com/${igHandle}` : '';
  const eventCount = getOrgEvents(org.name).length;

  const links = [];
  if (igUrl) links.push(`<a class="org-link ig" href="${igUrl}" target="_blank" onclick="event.stopPropagation()">📷 IG</a>`);
  if (org.fb) links.push(`<a class="org-link fb" href="${org.fb}" target="_blank" onclick="event.stopPropagation()">👥 FB</a>`);

  const safeId = org.name.replace(/[^a-zA-Z0-9]/g, '_');

  return `
    <div class="org-card ${cls}" id="org-${safeId}">
      <div class="org-card-header">
        <div class="org-area-badge">
          <span style="width:5px;height:5px;border-radius:50%;background:${dotColor};display:inline-block"></span>
          ${org.area}
        </div>
        <div class="org-name">${org.name}</div>
        ${org.intro ? `<div class="org-intro">${org.intro}</div>` : ''}
      </div>
      ${links.length ? `<div class="org-links">${links.join('')}</div>` : ''}
      <div class="org-events" id="events-${safeId}"></div>
      <button class="toggle-btn" onclick="toggleEvents('${org.name.replace(/'/g,"\\'")}', this)">
        <span class="toggle-icon">▾</span>
        查看近期活動${eventCount > 0 ? ` (${eventCount})` : ''}
      </button>
    </div>`;
}

// ── 主渲染 ──
function renderOrgs() {
  const main = document.getElementById('main');
  let filtered = allOrgs;
  if (currentArea !== 'all') filtered = filtered.filter(o => o.area === currentArea);

  if (!filtered.length) {
    main.innerHTML = `<div class="no-orgs">此地區暫無組織資料</div>`;
    return;
  }

  // 按地區分組
  const groups = {};
  AREA_ORDER.forEach(a => groups[a] = []);
  filtered.forEach(o => { if (groups[o.area]) groups[o.area].push(o); else groups['台北'].push(o); });

  let html = '';
  AREA_ORDER.forEach(area => {
    const orgs = groups[area];
    if (!orgs.length) return;
    if (currentArea !== 'all') {
      // 單一地區：不顯示地區標題
      html += `<div class="orgs-grid">${orgs.map(renderOrgCard).join('')}</div>`;
    } else {
      html += `
        <div class="area-group">
          <div class="area-header">
            <div class="area-title">
              <span class="area-dot-lg" style="background:${AREA_COLOR[area]}"></span>
              ${area}
            </div>
            <div class="area-line"></div>
            <div class="area-count">${orgs.length} 個組織</div>
          </div>
          <div class="orgs-grid">${orgs.map(renderOrgCard).join('')}</div>
        </div>`;
    }
  });

  main.innerHTML = html;
}

// ── 地區篩選 ──
function filterOrgs(area, btn) {
  currentArea = area;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrgs();
}

// ── 載入資料 ──
async function loadAll() {
  const main = document.getElementById('main');
  try {
    // 同時載入組織 API 和行事曆
    const [orgRes, calRes] = await Promise.all([
      fetch(ORG_API),
      fetch(WORKER_URL)
    ]);

    if (!orgRes.ok) throw new Error('組織資料載入失敗');
    if (!calRes.ok) throw new Error('行事曆載入失敗');

    const orgData = await orgRes.json();
    const calText = await calRes.text();

    allOrgs   = orgData.orgs || [];
    allEvents = parseICal(calText);

    renderOrgs();
  } catch (err) {
    main.innerHTML = `
      <div class="loading-state">
        <p style="font-size:2rem;margin-bottom:1rem">😔</p>
        <p>資料載入失敗：${err.message}</p>
      </div>`;
  }
}

loadAll();
</script>
</body>
</html>
